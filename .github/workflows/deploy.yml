name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin panel
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: build/
          target: /home/dev/web/api-simplefood.kozyr.info/public_html/

      - name: Install deps and restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            source ~/.bashrc || true
            source ~/.nvm/nvm.sh || true
            set -e
            cd /home/dev/web/api-simplefood.kozyr.info/public_html

            git pull origin main
            npm ci --omit=dev

            pm2 restart simplefood-backend || \
              pm2 start npm --name simplefood-backend -- run start
            pm2 save
