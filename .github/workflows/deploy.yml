name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /srv/simplefood/backend

            git pull origin main
            npm ci

            # Rebuild admin panel (required when Strapi or plugins change)
            npm run build

            pm2 restart simplefood-backend || \
              pm2 start npm --name simplefood-backend -- run start
            pm2 save
